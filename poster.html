<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victory Poster - India Champions Trophy 2025</title>
<!-- jbiq:v3.5.6 -->
<style>
@font-face { font-family: 'JioType'; font-weight: 400; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 500; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 700; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 900; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; margin: 0; background: #141414; overflow: hidden; }
body { font-family: 'JioType'; display: flex; justify-content: center; align-items: center; }

.poster {
  width: 360px; height: 640px; position: relative; overflow: hidden;
  background: linear-gradient(170deg, #050a20 0%, #0a1535 30%, #0d1f4a 60%, #081230 100%);
  border-radius: 16px;
}

/* Stadium background */
.stadium-glow {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 50% 85%, rgba(53,53,243,0.25) 0%, transparent 55%),
    radial-gradient(ellipse at 30% 20%, rgba(247,171,32,0.12) 0%, transparent 35%),
    radial-gradient(ellipse at 70% 15%, rgba(30,204,176,0.08) 0%, transparent 35%);
}

/* Floodlights */
.floodlight-l, .floodlight-r {
  position: absolute; top: 0; width: 120px; height: 200px;
}
.floodlight-l {
  left: 0;
  background: radial-gradient(ellipse at 0% 0%, rgba(255,255,255,0.06) 0%, transparent 70%);
}
.floodlight-r {
  right: 0;
  background: radial-gradient(ellipse at 100% 0%, rgba(255,255,255,0.06) 0%, transparent 70%);
}

/* Stadium crowd silhouette */
.crowd {
  position: absolute; bottom: 200px; left: 0; right: 0; height: 80px;
  background:
    repeating-linear-gradient(90deg,
      rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 3px,
      transparent 3px, transparent 6px);
  mask-image: linear-gradient(0deg, transparent 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
  -webkit-mask-image: linear-gradient(0deg, transparent 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
}

/* Confetti */
.confetti-box { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.conf {
  position: absolute; opacity: 0;
  animation: confDrop 4s ease-in infinite;
}
@keyframes confDrop {
  0% { opacity: 0; transform: translateY(-20px) rotate(0deg) scale(0.8); }
  8% { opacity: 0.9; }
  100% { opacity: 0; transform: translateY(700px) rotate(900deg) scale(0.4); }
}

/* === MAIN PLAYER (Bumrah celebrating) === */
.player-main {
  position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
  z-index: 10;
}
/* Body */
.player-body {
  width: 80px; height: 130px; position: relative;
}
/* Head */
.p-head {
  width: 40px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, #c8956c, #a87450);
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  z-index: 2;
}
/* Hair */
.p-hair {
  position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
  width: 42px; height: 22px; border-radius: 22px 22px 0 0;
  background: #1a1a1a;
}
/* Jersey (India blue) */
.p-jersey {
  position: absolute; top: 34px; left: 50%; transform: translateX(-50%);
  width: 64px; height: 52px; border-radius: 8px 8px 4px 4px;
  background: linear-gradient(180deg, #1a3c6e 0%, #15305a 100%);
  z-index: 1;
}
.p-jersey-num {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  font-size: 24px; font-weight: 900; color: rgba(255,255,255,0.85);
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
}
.p-jersey-stripe {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 56px; height: 4px; border-radius: 0 0 4px 4px;
  background: linear-gradient(90deg, #f06d0f, #f7ab20, #f06d0f);
}
/* Arms raised in celebration */
.p-arm-l {
  position: absolute; top: 20px; left: -8px; width: 14px; height: 55px;
  background: linear-gradient(180deg, #1a3c6e, #15305a);
  border-radius: 8px; transform: rotate(35deg); transform-origin: top center;
  animation: armPump 0.8s ease-in-out infinite alternate; z-index: 0;
}
.p-arm-r {
  position: absolute; top: 20px; right: -8px; width: 14px; height: 55px;
  background: linear-gradient(180deg, #1a3c6e, #15305a);
  border-radius: 8px; transform: rotate(-35deg); transform-origin: top center;
  animation: armPump 0.8s ease-in-out infinite alternate-reverse; z-index: 0;
}
@keyframes armPump {
  0% { transform: rotate(25deg); }
  100% { transform: rotate(-50deg); }
}
/* Hands (fists) */
.p-fist-l {
  position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
  width: 16px; height: 16px; border-radius: 50%;
  background: #c8956c;
}
.p-fist-r {
  position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
  width: 16px; height: 16px; border-radius: 50%;
  background: #c8956c;
}
/* Pants */
.p-pants {
  position: absolute; top: 82px; left: 50%; transform: translateX(-50%);
  width: 52px; height: 30px; border-radius: 4px;
  background: #e8e8fc;
}
/* Legs */
.p-leg-l, .p-leg-r {
  position: absolute; top: 108px; width: 14px; height: 24px;
  background: #e8e8fc; border-radius: 4px;
}
.p-leg-l { left: 16px; }
.p-leg-r { right: 16px; }

/* === SECOND PLAYER (left, running towards) === */
.player-left {
  position: absolute; bottom: 155px; left: 40px; z-index: 8;
  transform: scale(0.7);
}

/* === THIRD PLAYER (right, arms up) === */
.player-right {
  position: absolute; bottom: 148px; right: 35px; z-index: 8;
  transform: scale(0.65);
}

/* Player shadow */
.p-shadow {
  position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
  width: 60px; height: 12px; border-radius: 50%;
  background: rgba(0,0,0,0.3); filter: blur(4px);
}

/* === TROPHY (held by main player) === */
.trophy-wrap {
  position: absolute; bottom: 260px; left: 50%; transform: translateX(-50%);
  z-index: 15; animation: trophyFloat 2s ease-in-out infinite;
}
@keyframes trophyFloat {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-6px); }
}
.trophy-glow {
  position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 120px; border-radius: 50%;
  background: radial-gradient(circle, rgba(247,171,32,0.3) 0%, transparent 70%);
  animation: glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }

.trophy-svg {
  position: relative; z-index: 2;
  filter: drop-shadow(0 0 20px rgba(247,171,32,0.5));
}

/* === TEXT OVERLAY === */
.poster-overlay {
  position: absolute; inset: 0; z-index: 20;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 24px 20px;
}

/* Top section */
.poster-top { display: flex; flex-direction: column; gap: 8px; }
.breaking-badge {
  display: inline-flex; align-items: center; gap: 6px; align-self: flex-start;
  padding: 4px 12px; border-radius: 999px; background: #fa2f40;
}
.b-dot { width: 6px; height: 6px; border-radius: 50%; background: #ffffff; animation: blink 1s infinite; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.b-text { font-size: 10px; font-weight: 900; color: #ffffff; text-transform: uppercase; letter-spacing: 1.5px; }

.poster-headline {
  font-size: 32px; font-weight: 900; color: #ffffff; line-height: 1.05;
  letter-spacing: -1px; text-shadow: 0 4px 30px rgba(0,0,0,0.6);
}
.headline-gold { color: #ffd947; }

/* Bottom section */
.poster-bottom { display: flex; flex-direction: column; gap: 12px; }

/* Score card */
.score-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 12px;
  background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
}
.flag-wrap { width: 28px; height: 20px; border-radius: 3px; overflow: hidden; flex-shrink: 0; display: flex; flex-direction: column; }
.fl-saffron { flex: 1; background: #f06d0f; }
.fl-white { flex: 1; background: #ffffff; display: flex; align-items: center; justify-content: center; }
.fl-green { flex: 1; background: #25ab21; }
.fl-chakra { width: 5px; height: 5px; border-radius: 50%; border: 1px solid #3535f3; }
.fl-pak { background: #25ab21; position: relative; }
.fl-pak-w { position: absolute; left: 0; top: 0; bottom: 0; width: 28%; background: #ffffff; }

.team-info { display: flex; flex-direction: column; }
.team-name { font-size: 12px; font-weight: 700; color: #ffffff; }
.team-score { font-size: 12px; font-weight: 900; color: #ffd947; }
.vs-text { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.35); }
.result-text { font-size: 12px; font-weight: 700; color: #1eccb0; margin-left: auto; }

/* POTM strip */
.potm-strip {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 12px;
  background: rgba(247,171,32,0.12); border: 1px solid rgba(247,171,32,0.2);
}
.potm-icon {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, #3535f3, #3900ad);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: #ffffff; flex-shrink: 0;
}
.potm-tag { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #f7ab20; }
.potm-name { font-size: 14px; font-weight: 900; color: #ffffff; line-height: 1.2; }
.potm-stat { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.65); }

/* Verified bar */
.verified-bar {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 6px; border-radius: 8px; background: rgba(255,255,255,0.06);
}
.v-logo {
  width: 16px; height: 16px; border-radius: 4px; background: #3535f3;
  display: flex; align-items: center; justify-content: center;
}
.v-text { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.6); }
.v-check { color: #3535f3; }
</style>
</head>
<body>

<div class="poster" id="poster">
  <div class="stadium-glow"></div>
  <div class="floodlight-l"></div>
  <div class="floodlight-r"></div>
  <div class="crowd"></div>

  <!-- Confetti -->
  <div class="confetti-box" id="confBox"></div>

  <!-- Trophy -->
  <div class="trophy-wrap">
    <div class="trophy-glow"></div>
    <svg class="trophy-svg" width="80" height="80" viewBox="0 0 100 100" fill="none">
      <!-- Cup body -->
      <path d="M30 20h40v5c0 16-8 30-20 35-12-5-20-19-20-35V20z" fill="url(#gold1)" stroke="#c8860a" stroke-width="1"/>
      <!-- Left handle -->
      <path d="M30 25c-8 0-14 6-14 14s6 14 14 14" fill="none" stroke="url(#gold2)" stroke-width="4" stroke-linecap="round"/>
      <!-- Right handle -->
      <path d="M70 25c8 0 14 6 14 14s-6 14-14 14" fill="none" stroke="url(#gold2)" stroke-width="4" stroke-linecap="round"/>
      <!-- Stem -->
      <rect x="45" y="58" width="10" height="14" rx="2" fill="url(#gold1)"/>
      <!-- Base -->
      <ellipse cx="50" cy="76" rx="18" ry="5" fill="url(#gold1)" stroke="#c8860a" stroke-width="1"/>
      <rect x="35" y="72" width="30" height="4" rx="2" fill="url(#gold2)"/>
      <!-- Star on cup -->
      <path d="M50 30l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z" fill="#ffffff" opacity="0.3"/>
      <defs>
        <linearGradient id="gold1" x1="30" y1="20" x2="70" y2="80" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#ffd947"/>
          <stop offset="50%" stop-color="#f7ab20"/>
          <stop offset="100%" stop-color="#c8860a"/>
        </linearGradient>
        <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ffd947"/>
          <stop offset="100%" stop-color="#f7ab20"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <!-- Main Player (Bumrah - center) -->
  <div class="player-main">
    <div class="player-body">
      <div class="p-hair"></div>
      <div class="p-head"></div>
      <div class="p-arm-l">
        <div class="p-fist-l"></div>
      </div>
      <div class="p-arm-r">
        <div class="p-fist-r"></div>
      </div>
      <div class="p-jersey">
        <div class="p-jersey-stripe"></div>
        <div class="p-jersey-num">93</div>
      </div>
      <div class="p-pants"></div>
      <div class="p-leg-l"></div>
      <div class="p-leg-r"></div>
    </div>
    <div class="p-shadow"></div>
  </div>

  <!-- Second Player (left) -->
  <div class="player-left">
    <div class="player-body">
      <div class="p-hair"></div>
      <div class="p-head" style="background:linear-gradient(135deg,#b8845e,#9a6e45)"></div>
      <div class="p-arm-l" style="animation-delay:0.2s"><div class="p-fist-l" style="background:#b8845e"></div></div>
      <div class="p-arm-r" style="animation-delay:0.3s"><div class="p-fist-r" style="background:#b8845e"></div></div>
      <div class="p-jersey">
        <div class="p-jersey-stripe"></div>
        <div class="p-jersey-num">18</div>
      </div>
      <div class="p-pants"></div>
      <div class="p-leg-l"></div>
      <div class="p-leg-r"></div>
    </div>
    <div class="p-shadow"></div>
  </div>

  <!-- Third Player (right) -->
  <div class="player-right">
    <div class="player-body">
      <div class="p-hair"></div>
      <div class="p-head" style="background:linear-gradient(135deg,#d4a878,#b8905e)"></div>
      <div class="p-arm-l" style="animation-delay:0.15s"><div class="p-fist-l" style="background:#d4a878"></div></div>
      <div class="p-arm-r" style="animation-delay:0.25s"><div class="p-fist-r" style="background:#d4a878"></div></div>
      <div class="p-jersey">
        <div class="p-jersey-stripe"></div>
        <div class="p-jersey-num">45</div>
      </div>
      <div class="p-pants"></div>
      <div class="p-leg-l"></div>
      <div class="p-leg-r"></div>
    </div>
    <div class="p-shadow"></div>
  </div>

  <!-- Text overlay -->
  <div class="poster-overlay">
    <div class="poster-top">
      <div class="breaking-badge">
        <div class="b-dot"></div>
        <div class="b-text">Breaking</div>
      </div>
      <div class="poster-headline">
        <span class="headline-gold">INDIA WINS</span><br>
        CHAMPIONS<br>TROPHY 2025!
      </div>
    </div>

    <div class="poster-bottom">
      <div class="score-card">
        <div class="flag-wrap"><div class="fl-saffron"></div><div class="fl-white"><div class="fl-chakra"></div></div><div class="fl-green"></div></div>
        <div class="team-info"><div class="team-name">INDIA</div><div class="team-score">287/6</div></div>
        <div class="vs-text">vs</div>
        <div class="flag-wrap"><div class="fl-pak" style="width:28px;height:20px;border-radius:3px;overflow:hidden;position:relative;background:#25ab21"><div class="fl-pak-w"></div></div></div>
        <div class="team-info"><div class="team-name">PAKISTAN</div><div class="team-score">241 all out</div></div>
        <div class="result-text">Won by 46 runs</div>
      </div>

      <div class="potm-strip">
        <div class="potm-icon">JB</div>
        <div>
          <div class="potm-tag">Player of the Match</div>
          <div class="potm-name">Jasprit Bumrah</div>
          <div class="potm-stat">4/32 (10 overs) | Econ: 3.20</div>
        </div>
      </div>

      <div class="verified-bar">
        <div class="v-logo"><svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M12 2a1 1 0 00-1 1v18a1 1 0 002 0V3a1 1 0 00-1-1z"/></svg></div>
        <div class="v-text">JioBharatIQ</div>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="#3535f3"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        <div class="v-text">Verified News</div>
      </div>
    </div>
  </div>
</div>

<script>
// Spawn confetti
const box = document.getElementById('confBox');
const colors = ['#ffd947','#1eccb0','#9999ff','#fa2f40','#ffffff','#f7ab20','#e8e8fc'];
for (let i = 0; i < 50; i++) {
  const c = document.createElement('div');
  c.className = 'conf';
  c.style.left = Math.random()*100+'%';
  c.style.animationDelay = Math.random()*4+'s';
  c.style.animationDuration = (3+Math.random()*3)+'s';
  c.style.background = colors[Math.floor(Math.random()*colors.length)];
  const size = 4+Math.random()*8;
  c.style.width = size+'px';
  c.style.height = (Math.random()>0.4 ? size : size*0.4)+'px';
  c.style.borderRadius = Math.random()>0.5 ? '50%' : '1px';
  box.appendChild(c);
}
</script>
</body>
</html>
