<style>
@font-face { font-family: 'JioType'; font-weight: 400; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 500; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 700; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 900; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

:root {
  --primary: #3535f3;
  --primary-light: #e8e8fc;
  --primary-dark: #3900ad;
  --secondary: #f7ab20;
  --sparkle: #1eccb0;
  --error: #fa2f40;
  --warning: #f06d0f;
  --success: #25ab21;
  --grey-100: #141414;
  --grey-80: rgba(0,0,0,0.66);
  --grey-60: #b5b5b5;
  --grey-40: #e0e0e0;
  --grey-20: #f5f5f5;
  --surface-ghost: #eeeeef;
  --surface-bold: #3900ad;
  --white: #ffffff;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 23px;
  --radius-pill: 999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'JioType', sans-serif; background: var(--white); display: flex; flex-direction: column; }

.phone-frame { width: 100%; height: 100%; background: var(--white); position: relative; overflow: hidden; }

/* Chat header */
.chat-header {
  height: 56px; padding: 0 16px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--grey-40); background: var(--white); position: relative; z-index: 80;
}
.back-btn {
  width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; color: var(--grey-100); flex-shrink: 0;
}
.back-btn:hover { background: var(--surface-ghost); }
.back-btn:active { transform: scale(0.9); }
.chat-header-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--error);
  display: flex; align-items: center; justify-content: center;
}
.chat-header-info h3 { font-size: 16px; font-weight: 700; color: var(--grey-100); line-height: 1.2; }
.chat-header-info span { font-size: 12px; color: var(--success); font-weight: 500; }

/* Chat area */
.chat-area {
  flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 8px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth; background: var(--white);
}
.chat-area::-webkit-scrollbar { width: 0; }
.chat-body { display: flex; flex-direction: column; height: calc(100vh - 56px - 88px); }

/* Message bubbles */
.msg { max-width: 88%; animation: msgIn 0.35s ease-out; }
.msg-ai { align-self: flex-start; }
.msg-user { align-self: flex-end; }
.msg-full { max-width: 100%; width: 100%; }

.bubble { padding: 12px 16px; font-size: 14px; line-height: 1.5; color: var(--grey-100); word-wrap: break-word; }
.bubble-ai { background: var(--surface-ghost); border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg); }
.bubble-user { background: var(--primary); color: var(--white); border-radius: var(--radius-lg) 4px var(--radius-lg) var(--radius-lg); }

/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.chip {
  padding: 8px 16px; border-radius: var(--radius-pill); border: 1.5px solid var(--primary);
  color: var(--primary); font-size: 13px; font-weight: 700; cursor: pointer;
  background: var(--white); transition: all 0.2s;
}
.chip:hover, .chip:active { background: var(--primary); color: var(--white); }
.chip-disabled { opacity: 0.38; pointer-events: none; border-color: var(--grey-60); color: var(--grey-60); }
.chip-secondary { border-color: var(--secondary); color: var(--secondary); }
.chip-secondary:hover, .chip-secondary:active { background: var(--secondary); color: var(--white); }

/* Weather card */
.weather-card {
  background: linear-gradient(135deg, #3535f3, #3900ad);
  border-radius: var(--radius-lg); padding: 16px; color: var(--white); margin-top: 8px;
}
.weather-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.weather-temp { font-size: 32px; font-weight: 900; }
.weather-icon { font-size: 36px; }
.weather-details { font-size: 13px; opacity: 0.85; line-height: 1.5; }
.weather-city { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 4px; }

/* === Anchor Card (Full-screen briefing) === */
.anchor-card {
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  border-radius: var(--radius-lg); overflow-y: auto; color: var(--white);
  padding: 28px 20px 24px; text-align: center; position: relative;
  min-height: 640px; display: flex; flex-direction: column; align-items: center;
}
.anchor-hero { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; width: 100%; }
.anchor-avatar {
  width: 90px; height: 90px; border-radius: 50%;
  background: linear-gradient(135deg, var(--error), #c0392b);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 4px rgba(250,47,64,0.25), 0 0 40px rgba(250,47,64,0.2);
  margin-bottom: 10px;
}
.anchor-name { font-size: 18px; font-weight: 900; margin-bottom: 2px; }
.anchor-role { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
.anchor-status { font-size: 13px; color: var(--sparkle); font-weight: 700; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; }
.anchor-status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sparkle); animation: pulse-dot 1.5s infinite; }
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.anchor-timer { font-size: 13px; color: rgba(255,255,255,0.3); font-variant-numeric: tabular-nums; margin-top: 4px; }

/* Story progress bar */
.story-progress { display: flex; gap: 4px; margin: 16px 0 12px; width: 100%; max-width: 280px; }
.story-dot {
  flex: 1; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.15);
  transition: background 0.3s;
}
.story-dot-active { background: var(--sparkle); }
.story-dot-done { background: rgba(30,204,176,0.5); }

/* Waveform */
.anchor-waves { display: flex; gap: 4px; align-items: center; justify-content: center; height: 40px; margin: 12px 0; }
.anchor-wave-bar { width: 4px; border-radius: 99px; background: var(--primary); animation: anchorWave 1s ease-in-out infinite; }
@keyframes anchorWave { 0%, 100% { height: 8px; opacity: 0.4; } 50% { height: 32px; opacity: 1; } }
.anchor-waves-paused .anchor-wave-bar { animation: none; height: 6px; opacity: 0.3; }

/* Story badge */
.story-badge {
  display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px;
  border-radius: var(--radius-pill); font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
}
.badge-local { background: rgba(30,204,176,0.15); color: var(--sparkle); }
.badge-business { background: rgba(247,171,32,0.15); color: var(--secondary); }
.badge-markets { background: rgba(53,53,243,0.15); color: #9999ff; }
.badge-sports { background: rgba(37,171,33,0.15); color: var(--success); }
.badge-gold { background: rgba(247,171,32,0.2); color: var(--secondary); }
.badge-good { background: rgba(30,204,176,0.15); color: var(--sparkle); }
.badge-weather { background: rgba(53,53,243,0.15); color: #9999ff; }

/* Transcript area */
.anchor-transcript {
  background: rgba(255,255,255,0.06); border-radius: var(--radius-md);
  padding: 14px 16px; width: 100%; text-align: left; margin-top: 10px;
  border: 1px solid rgba(255,255,255,0.06); min-height: 80px;
}
.anchor-transcript-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: rgba(255,255,255,0.35); margin-bottom: 8px;
}
.anchor-transcript-text { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.85); }
.anchor-transcript-text strong { color: var(--white); }

/* Deep dive panel */
.deep-dive-panel {
  background: rgba(247,171,32,0.08); border-radius: var(--radius-md); padding: 14px 16px;
  width: 100%; text-align: left; margin-top: 10px;
  border-left: 3px solid var(--secondary);
}
.deep-dive-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--secondary); margin-bottom: 8px; }
.deep-dive-text { font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.85); }
.deep-dive-text strong { color: var(--white); }

/* Anchor action buttons */
.anchor-actions { display: flex; gap: 14px; margin-top: 16px; align-items: center; justify-content: center; }
.anchor-btn {
  width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.anchor-btn:active { transform: scale(0.9); }
.anchor-btn-skip { background: rgba(255,255,255,0.12); color: var(--white); border: 1px solid rgba(255,255,255,0.15); }
.anchor-btn-mic { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.35); border: 1.5px solid rgba(255,255,255,0.15); }
.anchor-btn-mic.mic-active { color: #ffffff; border-color: rgba(255,255,255,0.85); box-shadow: 0 0 0 3px rgba(255,255,255,0.2); }
.anchor-btn-end { background: var(--error); color: var(--white); width: 44px; height: 44px; }
.anchor-btn-more {
  background: rgba(247,171,32,0.15); color: var(--secondary);
  border: 1.5px solid rgba(247,171,32,0.3); padding: 0 16px;
  width: auto; border-radius: var(--radius-pill); font-size: 12px; font-weight: 700;
  font-family: 'JioType', sans-serif; height: 40px;
}
.anchor-btn-more:hover { background: rgba(247,171,32,0.25); }
.anchor-hint { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 8px; text-align: center; }

/* Summary card */
.summary-card {
  background: rgba(255,255,255,0.08); border-radius: var(--radius-md); padding: 14px 16px;
  width: 100%; text-align: left; margin-top: 10px;
}
.summary-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--sparkle); margin-bottom: 10px; }
.summary-item { font-size: 13px; line-height: 1.8; color: rgba(255,255,255,0.8); }
.summary-item strong { color: var(--white); }

/* Notification card */
.notif-card {
  background: var(--surface-ghost); border-radius: var(--radius-lg); padding: 16px;
  display: flex; align-items: center; gap: 12px; margin-top: 8px; cursor: pointer;
  transition: all 0.2s; border: 1.5px solid transparent;
}
.notif-card:hover { border-color: var(--primary); background: var(--primary-light); }
.notif-icon {
  width: 44px; height: 44px; border-radius: 50%; background: var(--error);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.notif-text h4 { font-size: 14px; font-weight: 700; color: var(--grey-100); line-height: 1.3; }
.notif-text p { font-size: 12px; color: var(--grey-80); margin-top: 2px; }
.notif-time { font-size: 11px; color: var(--grey-60); margin-left: auto; flex-shrink: 0; }

/* Entry point cards */
.entry-card {
  padding: 14px 16px; border-radius: var(--radius-lg); background: var(--white);
  border: 1.5px solid var(--grey-40); cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 12px; margin-top: 6px;
}
.entry-card:hover, .entry-card:active { border-color: var(--primary); background: var(--primary-light); }
.entry-icon {
  width: 40px; height: 40px; border-radius: var(--radius-sm); background: var(--primary);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.entry-card h4 { font-size: 14px; font-weight: 700; color: var(--grey-100); }
.entry-card p { font-size: 12px; color: var(--grey-80); margin-top: 2px; }

/* Topic preference cards */
.topic-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.topic-chip {
  padding: 10px 14px; border-radius: var(--radius-pill); border: 1.5px solid var(--grey-40);
  font-size: 13px; font-weight: 500; cursor: pointer; background: var(--white);
  transition: all 0.2s; color: var(--grey-100);
}
.topic-chip:active, .topic-chip.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 700; }

/* Multi-modal chat input */
.input-widget { padding: 2px 12px 16px; background: var(--white); position: relative; z-index: 80; }
.input-field-wrap {
  background: var(--surface-ghost); border-radius: var(--radius-xl); padding: 6px;
  display: flex; flex-direction: column;
}
.input-text-area { padding: 10px 8px; display: flex; align-items: center; }
.input-text-area input {
  font-family: 'JioType', sans-serif; font-size: 14px; font-weight: 400; color: var(--grey-100);
  background: transparent; border: none; outline: none; width: 100%; line-height: 1.3;
}
.input-text-area input::placeholder { color: var(--grey-60); opacity: 0.65; }
.input-actions { display: flex; justify-content: space-between; align-items: center; height: 43px; }
.input-left-actions { display: flex; gap: 2px; }
.input-icon-btn {
  width: 36px; height: 36px; border-radius: var(--radius-pill);
  display: flex; align-items: center; justify-content: center;
  background: #e7e9ff; border: none; cursor: pointer;
}
.input-icon-btn:active { opacity: 0.7; }
.input-icon-btn svg { width: 20px; height: 20px; }
.speak-btn {
  background: var(--surface-bold); border: none; border-radius: var(--radius-pill);
  padding: 10px 20px; display: flex; align-items: center; gap: 8px; cursor: pointer;
}
.speak-btn:active { opacity: 0.85; }
.speak-btn svg { width: 18px; height: 18px; }
.speak-btn span { font-family: 'JioType', sans-serif; font-weight: 700; font-size: 14px; color: var(--white); line-height: 1; }

/* Typing indicator */
.typing { display: flex; gap: 4px; padding: 12px 16px; }
.typing-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--grey-60);
  animation: typingAnim 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* Animations */
@keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes typingAnim { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

/* Utility */
.hidden { display: none !important; }
.fade-in { animation: msgIn 0.4s ease-out; }
</style>

const ELEVENLABS_VOICE_ID = 'pNInz6obpgDQGcFmaJgB'; // Adam (warm deep male)
const ttsCache = new Map();
let currentAudio = null;
let isSpeaking = false;

async function elevenLabsTTS(text, onended = null) {
  const cacheKey = text;
  if (ttsCache.has(cacheKey)) {
    playAudioFromUrl(ttsCache.get(cacheKey), onended);
    return;
  }
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`, {
      method: 'POST',
      headers: { 'xi-api-key': ELEVENLABS_API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: text,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { stability: 0.6, similarity_boost: 0.75, style: 0.3, use_speaker_boost: true }
      })
    });
    if (!res.ok) throw new Error('ElevenLabs API error: ' + res.status);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    ttsCache.set(cacheKey, url);
    playAudioFromUrl(url, onended);
  } catch (e) {
    console.warn('ElevenLabs TTS failed, using browser fallback:', e);
    browserSpeak(text, 0.9);
    if (onended) setTimeout(onended, Math.max(3000, text.length * 60));
  }
}

function playAudioFromUrl(url, onended) {
  stopCurrentAudio();
  currentAudio = new Audio(url);
  isSpeaking = true;
  if (onended) currentAudio.onended = () => { isSpeaking = false; onended(); };
  else currentAudio.onended = () => { isSpeaking = false; };
  currentAudio.play().catch(e => {
    console.warn('Audio play failed:', e);
    isSpeaking = false;
    if (onended) setTimeout(onended, 300);
  });
}

function stopCurrentAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    isSpeaking = false;
  }
}

function browserSpeak(text, rate = 0.9) {
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'hi-IN'; utter.rate = rate; utter.pitch = 1;
  speechSynthesis.speak(utter);
}

// Pre-cache TTS for upcoming stories
function preCacheStories(fromIndex = 0) {
  const stories = briefingStories.slice(fromIndex, fromIndex + 3);
  stories.forEach(s => {
    const cacheKey = s.speakText;
    if (ttsCache.has(cacheKey)) return;
    fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`, {
      method: 'POST',
      headers: { 'xi-api-key': ELEVENLABS_API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: s.speakText,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { stability: 0.6, similarity_boost: 0.75, style: 0.3, use_speaker_boost: true }
      })
    }).then(r => r.blob()).then(blob => {
      ttsCache.set(cacheKey, URL.createObjectURL(blob));
    }).catch(() => {});
  });
}

function addMsg(type, html, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = `msg msg-${type} fade-in`;
      div.innerHTML = `<div class="bubble bubble-${type}">${html}</div>`;
      chatArea.appendChild(div);
      scrollToBottom();
      resolve();
    }, delay);
  });
}

function addRaw(html, delay = 0, fullWidth = false) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = `msg msg-ai fade-in${fullWidth ? ' msg-full' : ''}`;
      div.innerHTML = html;
      chatArea.appendChild(div);
      scrollToBottom();
      resolve();
    }, delay);
  });
}

// === Briefing Engine ===
let briefingStep = 0;
let briefingTimerInterval = null;
let briefingSeconds = 0;
let isDeepDiving = false;

function startBriefingTimer() {
  briefingSeconds = 0;
  if (briefingTimerInterval) clearInterval(briefingTimerInterval);
  briefingTimerInterval = setInterval(() => {
    briefingSeconds++;
    const m = String(Math.floor(briefingSeconds / 60)).padStart(2, '0');
    const s = String(briefingSeconds % 60).padStart(2, '0');
    const el = document.getElementById('briefingTimer');
    if (el) el.textContent = m + ':' + s;
  }, 1000);
}

function stopBriefingTimer() {
  if (briefingTimerInterval) { clearInterval(briefingTimerInterval); briefingTimerInterval = null; }
}

function renderBriefingStep(step) {
  const story = briefingStories[step];
  if (!story) return;

  const content = document.getElementById('briefingContent');
  const statusEl = document.getElementById('briefingStatus');
  const wavesEl = document.getElementById('briefingWaves');
  const actionsEl = document.getElementById('briefingActions');
  if (!content || !statusEl) return;

  // Update progress dots
  document.querySelectorAll('.story-dot').forEach((dot, i) => {
    dot.className = 'story-dot';
    if (i < step) dot.classList.add('story-dot-done');
    else if (i === step) dot.classList.add('story-dot-active');
  });

  const isFinal = step === briefingStories.length - 1;
  const totalStories = briefingStories.length - 2; // minus greeting and signoff
  const storyNum = step === 0 ? '' : (step <= totalStories ? `Story ${step}/${totalStories}` : '');

  // Update status
  if (isFinal) {
    const timerEl = document.getElementById('briefingTimer');
    statusEl.innerHTML = '<div class="anchor-status-dot" style="background:var(--secondary)"></div> Briefing Complete \u00B7 ' + (timerEl ? timerEl.textContent : '');
    statusEl.style.color = 'var(--secondary)';
    stopBriefingTimer();
    wavesEl.classList.add('anchor-waves-paused');
  } else {
    statusEl.style.color = '';
    const label = step === 0 ? 'Starting...' : `Playing ${storyNum}`;
    statusEl.innerHTML = '<div class="anchor-status-dot"></div> ' + label;
    wavesEl.classList.remove('anchor-waves-paused');
  }

  // Fade transition
  content.style.transition = 'opacity 0.2s ease';
  content.style.opacity = '0';
  setTimeout(() => {
    let html = `<div class="story-badge ${story.badgeClass}">${story.category}</div>`;
    html += `<div class="anchor-transcript"><div class="anchor-transcript-label">${story.title}</div><div class="anchor-transcript-text">${story.transcript}</div></div>`;

    // Show deep dive hint on business story
    if (story.hasDeepDive && !isDeepDiving) {
      html += '<div class="anchor-hint">Tap "Aur batao" to go deeper on this story</div>';
    }

    content.innerHTML = html;
    content.style.opacity = '1';
    scrollToBottom();
  }, 200);

  // Update action buttons
  if (isFinal) {
    actionsEl.innerHTML = `
      <button class="anchor-btn anchor-btn-skip" onclick="replayBriefing()" title="Replay">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4a8 8 0 013.85 1H15a1 1 0 100 2h3a1 1 0 001-1V3a1 1 0 00-2 0v.36A10 10 0 0012 2a10 10 0 00-8.65 5A9.94 9.94 0 002 12a1 1 0 102 0 8 8 0 018-8zm9.71 7.29A1 1 0 0020 12a8 8 0 01-11.84 7H9a1 1 0 000-2H6a1 1 0 00-1 1v3a1 1 0 102 0v-.36A10 10 0 0012 22a10 10 0 0010-10 1 1 0 00-.29-.71z"/></svg>
      </button>`;
  } else {
    const moreBtn = story.hasDeepDive
      ? `<button class="anchor-btn anchor-btn-more" onclick="triggerDeepDive()">Aur batao</button>`
      : '';
    actionsEl.innerHTML = `
      <button class="anchor-btn anchor-btn-skip" onclick="replayStoryAudio()" title="Replay">${ICONS.volume}</button>
      ${moreBtn}
      <button class="anchor-btn anchor-btn-mic" id="anchorMicBtn" onclick="triggerDeepDive()" title="Speak">${ICONS.mic}</button>
      <button class="anchor-btn anchor-btn-skip" onclick="skipStory()" title="Skip">${ICONS.skip}</button>
      <button class="anchor-btn anchor-btn-end" onclick="endBriefing()" title="End">${ICONS.end}</button>`;
  }

  // Speak the story
  elevenLabsTTS(story.speakText, () => {
    if (isDeepDiving) return;
    // Auto-advance after speaking
    if (!isFinal) {
      setTimeout(() => {
        if (!isDeepDiving) advanceBriefing();
      }, 800);
    } else {
      // Show summary on final step
      showBriefingSummary();
    }
  });

  // Pre-cache next stories
  preCacheStories(step + 1);
}

function advanceBriefing() {
  if (briefingStep < briefingStories.length - 1) {
    briefingStep++;
    renderBriefingStep(briefingStep);
  }
}

function skipStory() {
  stopCurrentAudio();
  isDeepDiving = false;
  advanceBriefing();
}

function replayStoryAudio() {
  const story = briefingStories[briefingStep];
  if (story) {
    elevenLabsTTS(story.speakText);
  }
}

function replayBriefing() {
  briefingStep = 0;
  briefingSeconds = 0;
  isDeepDiving = false;
  startBriefingTimer();
  renderBriefingStep(0);
}

function triggerDeepDive() {
  const story = briefingStories[briefingStep];
  if (!story || !story.hasDeepDive || isDeepDiving) return;

  stopCurrentAudio();
  isDeepDiving = true;

  const content = document.getElementById('briefingContent');
  const statusEl = document.getElementById('briefingStatus');
  const actionsEl = document.getElementById('briefingActions');
  const wavesEl = document.getElementById('briefingWaves');
  if (!content) return;

  statusEl.innerHTML = '<div class="anchor-status-dot" style="background:var(--secondary)"></div> Deep Dive';
  statusEl.style.color = 'var(--secondary)';
  wavesEl.classList.remove('anchor-waves-paused');

  content.style.opacity = '0';
  setTimeout(() => {
    let html = `<div class="story-badge badge-business">DEEP DIVE</div>`;
    html += `<div class="deep-dive-panel"><div class="deep-dive-label">Detailed Explanation</div><div class="deep-dive-text">${story.deepDiveTranscript}</div></div>`;
    content.innerHTML = html;
    content.style.opacity = '1';
    scrollToBottom();
  }, 200);

  actionsEl.innerHTML = `
    <button class="anchor-btn anchor-btn-skip" onclick="replayDeepDive()" title="Replay">${ICONS.volume}</button>
    <button class="anchor-btn anchor-btn-more" onclick="resumeBriefing()" style="background:rgba(30,204,176,0.15);color:var(--sparkle);border-color:rgba(30,204,176,0.3)">Aage chalo</button>
    <button class="anchor-btn anchor-btn-end" onclick="endBriefing()" title="End">${ICONS.end}</button>`;

  elevenLabsTTS(story.deepDiveSpeakText, () => {
    // After deep dive, wait for user to say "aage chalo"
  });
}

function replayDeepDive() {
  const story = briefingStories[briefingStep];
  if (story && story.deepDiveSpeakText) {
    elevenLabsTTS(story.deepDiveSpeakText);
  }
}

function resumeBriefing() {
  stopCurrentAudio();
  isDeepDiving = false;

  const statusEl = document.getElementById('briefingStatus');
  if (statusEl) {
    statusEl.style.color = '';
  }

  advanceBriefing();
}

function endBriefing() {
  stopCurrentAudio();
  stopBriefingTimer();
  isDeepDiving = false;

  const statusEl = document.getElementById('briefingStatus');
  const wavesEl = document.getElementById('briefingWaves');
  const actionsEl = document.getElementById('briefingActions');
  const timerEl = document.getElementById('briefingTimer');

  if (statusEl) {
    statusEl.innerHTML = '<div class="anchor-status-dot" style="background:var(--secondary)"></div> Briefing Ended \u00B7 ' + (timerEl ? timerEl.textContent : '');
    statusEl.style.color = 'var(--secondary)';
  }
  if (wavesEl) wavesEl.classList.add('anchor-waves-paused');
  if (actionsEl) {
    actionsEl.innerHTML = `<button class="anchor-btn anchor-btn-skip" onclick="replayBriefing()" title="Replay">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4a8 8 0 013.85 1H15a1 1 0 100 2h3a1 1 0 001-1V3a1 1 0 00-2 0v.36A10 10 0 0012 2a10 10 0 00-8.65 5A9.94 9.94 0 002 12a1 1 0 102 0 8 8 0 018-8zm9.71 7.29A1 1 0 0020 12a8 8 0 01-11.84 7H9a1 1 0 000-2H6a1 1 0 00-1 1v3a1 1 0 102 0v-.36A10 10 0 0012 22a10 10 0 0010-10 1 1 0 00-.29-.71z"/></svg>
    </button>`;
  }

  showBriefingSummary();
}

function showBriefingSummary() {
  const content = document.getElementById('briefingContent');
  if (!content) return;

  const summaryHtml = `<div class="summary-card">
    <div class="summary-title">Today's Briefing Summary</div>
    <div class="summary-item">\u2022 <strong>Traffic Alert:</strong> Sigra-Lanka diversion 10am-4pm</div>

      await addRaw(`<div class="chips">
        <span class="chip" onclick="selectLanguage('Hindi')">Hindi</span>
        <span class="chip chip-disabled">English</span>
        <span class="chip chip-disabled">\u0917\u0941\u091C\u0930\u093E\u0924\u0940</span>
        <span class="chip chip-disabled">\u0924\u092E\u093F\u0934</span>
      </div>`, 200);
      break;

    case 'setup_ready':
      showTyping(); await wait(600); hideTyping();
      await addMsg('ai', `${userName} ji, aapka briefing tayyar hai! <strong>7 stories, ~7 minutes.</strong> Beech mein kisi bhi story par bol sakte hain <strong>"Aur batao"</strong> aur main detail mein bataunga.`);
      await addRaw(`<div class="entry-card" onclick="goToState('briefing')">
        <div class="entry-icon" style="background:var(--error)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M19.15 10.36l-10-7A2 2 0 008 3a1.88 1.88 0 00-.92.23A2 2 0 006 5v14a2 2 0 001.08 1.77c.282.154.599.233.92.23a2 2 0 001.15-.36l10-7a2 2 0 000-3.28z"/></svg>
        </div>
        <div>
          <h4>Play Morning Briefing</h4>
          <p>${userName} ji ka personalised briefing \u2022 7 stories</p>
        </div>
      </div>`, 300);
      break;

    case 'briefing':
      // Remove existing anchor cards
      document.querySelectorAll('.anchor-card').forEach(c => c.closest('.msg')?.remove());
      stopBriefingTimer();
      briefingStep = 0;
      briefingSeconds = 0;
      isDeepDiving = false;
      preCacheStories(0);

      // Build the anchor card
      const waveBars = [8,14,22,30,22,30,22,14,8];
      const storyDots = briefingStories.map(() => '<div class="story-dot"></div>').join('');

      const cardDiv = document.createElement('div');
      cardDiv.className = 'msg msg-ai msg-full fade-in';
      cardDiv.innerHTML = `<div class="anchor-card" id="anchorCard">
        <div class="anchor-hero">
          <div class="anchor-avatar">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="white"><path d="M12 2a1 1 0 00-1 1v18a1 1 0 002 0V3a1 1 0 00-1-1zM4 9a1 1 0 00-1 1v4a1 1 0 102 0v-4a1 1 0 00-1-1zm4-3a1 1 0 00-1 1v10a1 1 0 102 0V7a1 1 0 00-1-1zm12 3a1 1 0 00-1 1v4a1 1 0 002 0v-4a1 1 0 00-1-1zm-4-3a1 1 0 00-1 1v10a1 1 0 002 0V7a1 1 0 00-1-1z"/></svg>
          </div>
          <div class="anchor-name">${userName} ji ka Briefing</div>
          <div class="anchor-role">Jio News AI \u2022 Varanasi</div>
          <div class="anchor-status" id="briefingStatus"><div class="anchor-status-dot"></div> Starting...</div>
          <div class="anchor-timer" id="briefingTimer">00:00</div>
        </div>
        <div class="story-progress">${storyDots}</div>
        <div class="anchor-waves" id="briefingWaves">
          ${waveBars.map((h,i) => `<div class="anchor-wave-bar" style="animation-delay:${i*0.12}s;height:${h}px"></div>`).join('')}
        </div>
        <div id="briefingContent"></div>
        <div class="anchor-actions" id="briefingActions"></div>
      </div>`;
      chatArea.appendChild(cardDiv);
      scrollToBottom();

      startBriefingTimer();
      setTimeout(() => renderBriefingStep(0), 600);
      break;

    case 'briefing_end':
      showTyping(); await wait(600); hideTyping();
      await addMsg('ai', `${userName} ji, aaj ka briefing complete hua! Kal subah 6:15 AM par phir milenge.`);
      await addRaw(`<div class="chips">
        <span class="chip" onclick="goToState('briefing')">Replay Briefing</span>
        <span class="chip chip-secondary" onclick="goToState('welcome')">Back to Start</span>
      </div>`, 200);
      break;
  }
}

// === Event Handlers ===
let userName = 'Rajesh';
let userCity = 'Varanasi';

function selectName(name) {
  userName = name;
  addMsg('user', name).then(() => goToState('setup_city'));
}

function selectCity(city) {
  userCity = city;
  addMsg('user', city).then(() => goToState('setup_topics'));
}

function selectLanguage(lang) {
  addMsg('user', lang).then(() => goToState('setup_ready'));
}

function toggleTopic(el) {
  el.classList.toggle('selected');
}

// Initialize
goToState('welcome');
</script>
